<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 80">
  <defs>
    <style>
      @keyframes flow { to { stroke-dashoffset: -24; } }
    </style>
    <pattern id="dots" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="0.6" fill="#21262d"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="900" height="80" fill="#0d1117"/>
  <rect width="900" height="80" fill="url(#dots)"/>

  <!-- Converging traces -->
  <path d="M 0 22 H 340 V 40 H 420" stroke="#58a6ff" stroke-width="1.2" fill="none" opacity="0.25" stroke-dasharray="8 4" style="animation: flow 3s linear infinite"/>
  <path d="M 0 55 H 290 V 40 H 420" stroke="#58a6ff" stroke-width="1.2" fill="none" opacity="0.18" stroke-dasharray="8 4" style="animation: flow 3.5s linear infinite"/>
  <path d="M 900 22 H 560 V 40 H 480" stroke="#58a6ff" stroke-width="1.2" fill="none" opacity="0.25" stroke-dasharray="8 4" style="animation: flow 3s linear infinite"/>
  <path d="M 900 55 H 610 V 40 H 480" stroke="#58a6ff" stroke-width="1.2" fill="none" opacity="0.18" stroke-dasharray="8 4" style="animation: flow 3.5s linear infinite"/>

  <!-- Center via -->
  <circle cx="450" cy="40" r="6" fill="none" stroke="#58a6ff" stroke-width="0.8" opacity="0.35"/>
  <circle cx="450" cy="40" r="2" fill="#58a6ff" opacity="0.35"/>

  <!-- Side vias -->
  <circle cx="340" cy="40" r="3" fill="none" stroke="#58a6ff" stroke-width="0.6" opacity="0.2"/>
  <circle cx="340" cy="40" r="1" fill="#58a6ff" opacity="0.2"/>
  <circle cx="560" cy="40" r="3" fill="none" stroke="#58a6ff" stroke-width="0.6" opacity="0.2"/>
  <circle cx="560" cy="40" r="1" fill="#58a6ff" opacity="0.2"/>

  <!-- Outer vias -->
  <circle cx="200" cy="40" r="3" fill="none" stroke="#58a6ff" stroke-width="0.5" opacity="0.15"/>
  <circle cx="200" cy="40" r="1" fill="#58a6ff" opacity="0.15"/>
  <circle cx="700" cy="40" r="3" fill="none" stroke="#58a6ff" stroke-width="0.5" opacity="0.15"/>
  <circle cx="700" cy="40" r="1" fill="#58a6ff" opacity="0.15"/>

</svg>
