<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 495 195">
  <defs>
    <style>
      @keyframes pulse-bar { 0%, 100% { opacity: 0.15; } 50% { opacity: 0.35; } }
    </style>
  </defs>

  <!-- Card background -->
  <rect width="495" height="195" rx="6" fill="#0d1117"/>

  <!-- Title -->
  <text x="25" y="35" font-family="'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="600" fill="#58a6ff">Engineering Metrics</text>
  <line x1="25" y1="48" x2="470" y2="48" stroke="#21262d" stroke-width="0.5"/>

  <!-- PCB Complexity -->
  <text x="25" y="73" font-family="'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#8b949e">PCB Complexity</text>
  <rect x="170" y="62" width="240" height="14" rx="4" fill="#161b22"/>
  <rect x="170" y="62" width="240" height="14" rx="4" fill="#8957e5" opacity="0.75"/>
  <text x="420" y="73" font-family="'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#e6edf3" font-weight="600">6-Layer</text>

  <!-- Test Voltage -->
  <text x="25" y="98" font-family="'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#8b949e">Test Voltage</text>
  <rect x="170" y="87" width="240" height="14" rx="4" fill="#161b22"/>
  <rect x="170" y="87" width="216" height="14" rx="4" fill="#da3633" opacity="0.75"/>
  <text x="420" y="98" font-family="'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#e6edf3" font-weight="600">~1 kV DC</text>

  <!-- Firmware Style -->
  <text x="25" y="123" font-family="'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#8b949e">Firmware Style</text>
  <rect x="170" y="112" width="240" height="14" rx="4" fill="#161b22"/>
  <rect x="170" y="112" width="240" height="14" rx="4" fill="#238636" opacity="0.75"/>
  <text x="420" y="123" font-family="'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#e6edf3" font-weight="600">Bare Metal</text>

  <!-- Platforms -->
  <text x="25" y="148" font-family="'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#8b949e">Platforms</text>
  <text x="170" y="148" font-family="'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#c9d1d9">ARM Cortex-M · RISC-V · Embedded Linux</text>

  <!-- Vendor HAL Usage (the punchline) -->
  <text x="25" y="173" font-family="'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#8b949e">Vendor HAL Usage</text>
  <rect x="170" y="162" width="240" height="14" rx="4" fill="#161b22"/>
  <rect x="170" y="162" width="3" height="14" rx="2" fill="#6e7681" style="animation: pulse-bar 3s ease-in-out infinite"/>
  <text x="420" y="173" font-family="'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#e6edf3" font-weight="600">0%</text>

</svg>
